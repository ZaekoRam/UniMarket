    <script>
        const body = document.body;
        const themeToggleInput = document.getElementById("themeToggleInput");
        const themeText = document.getElementById("themeText");

        const translations = {
            es: {
                inicio: "Inicio",
                perfil: "Perfil",
                mensajes: "Mensajes",
                notificaciones: "Notificaciones",
                configuraciones: "Configuraciones",
                cerrarSesion: "Cerrar sesión",
                fraseInicio: "Todo comienza por un 0",
                crearPublicacion: "Crear publicación",
                subCrearPublicacion: "Comparte algo con la comunidad de UniMarket",
                publicar: "Publicar",
                saludoInvitado: "Hola, Invitado",
                saludoUsuario: "Hola, {nombre}",
                placeholderTexto: "¿Qué vamos a emprender hoy?",
                agregarImagen: "📷 Agregar imagen",
                placeholderEnlace: "Enlace externo (https://...)",
                anonimo: "Anón",
                responder: "↳ Responder",
                meGusta: "👍 Me gusta",
                noMeGusta: "👎 No me gusta",
                escribeComentario: "Escribe un comentario...",
                escribeRespuesta: "Escribe tu respuesta...",
                editar: "Editar",
                eliminar: "Eliminar",
                editarEnlace: "Editar enlace",
                guardar: "Guardar",
                haceUnMomento: "Hace un momento",
                confirmarEliminar: "¿Seguro que quieres eliminar esta publicación?",
                errorEliminar: "No se pudo eliminar la publicación.",
                errorIdPost: "No se encontró el ID de la publicación."
            },
            en: {
                inicio: "Home",
                perfil: "Profile",
                mensajes: "Messages",
                notificaciones: "Notifications",
                configuraciones: "Settings",
                cerrarSesion: "Log out",
                fraseInicio: "Everything starts from zero",
                crearPublicacion: "Create post",
                subCrearPublicacion: "Share something with the UniMarket community",
                publicar: "Post",
                saludoInvitado: "Hello, Guest",
                saludoUsuario: "Hello, {nombre}",
                placeholderTexto: "What are we building today?",
                agregarImagen: "📷 Add image",
                placeholderEnlace: "External link (https://...)",
                anonimo: "Anon",
                responder: "↳ Reply",
                meGusta: "👍 Like",
                noMeGusta: "👎 Dislike",
                escribeComentario: "Write a comment...",
                escribeRespuesta: "Write your reply...",
                editar: "Edit",
                eliminar: "Delete",
                editarEnlace: "Edit link",
                guardar: "Save",
                haceUnMomento: "Just now",
                confirmarEliminar: "Are you sure you want to delete this post?",
                errorEliminar: "Could not delete the post.",
                errorIdPost: "Post ID was not found."
            }
        };

        function getLang() {
            return localStorage.getItem("lang") || "es";
        }

        function t(key) {
            const lang = getLang();
            return translations[lang][key] || key;
        }

        function aplicarIdioma(lang) {
            localStorage.setItem("lang", lang);
            document.documentElement.lang = lang;

            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.dataset.i18n;
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });

            document.getElementById("texto").placeholder = translations[lang].placeholderTexto;
            document.getElementById("labelImagen").textContent = translations[lang].agregarImagen;
            document.getElementById("urlEnlace").placeholder = translations[lang].placeholderEnlace;

            const saludoActual = document.getElementById("saludoUsuario");
        const nombreActual = saludoActual.dataset.nombreActual || "";

        if (nombreActual) {
            // Ponemos el saludo con el nombre
            saludoActual.textContent = translations[lang].saludoUsuario.replace("{nombre}", nombreActual);
            
            // 🔥 MAGIA DE LAS DOS INICIALES PARA LOS ICONOS PRINCIPALES 🔥
            const palabras = nombreActual.trim().split(" ");
            let iniciales = palabras[0].charAt(0).toUpperCase();
            if (palabras.length > 1) {
                iniciales += palabras[1].charAt(0).toUpperCase();
            }
            
            // Se las ponemos a los circulitos de perfil y de publicar
            document.getElementById("profileInitial").textContent = iniciales;
            document.getElementById("publishInitial").textContent = iniciales;
            
        } else {
            // Si es invitado (no ha iniciado sesión)
            saludoActual.textContent = translations[lang].saludoInvitado;
            const inicialInvitado = lang === "en" ? "G" : "I";
            
            document.getElementById("profileInitial").textContent = inicialInvitado;
            document.getElementById("publishInitial").textContent = inicialInvitado;
        }
        }

        function aplicarTema(modo) {
            if (modo === "light") {
                body.classList.add("light-mode");
                themeToggleInput.checked = true;
                themeText.textContent = "Light Mode";
            } else {
                body.classList.remove("light-mode");
                themeToggleInput.checked = false;
                themeText.textContent = "Dark Mode";
            }
        }

        const temaGuardado = localStorage.getItem("theme") || "dark";
        aplicarTema(temaGuardado);

        themeToggleInput.addEventListener("change", () => {
            const nuevoTema = themeToggleInput.checked ? "light" : "dark";
            localStorage.setItem("theme", nuevoTema);
            aplicarTema(nuevoTema);
        });

        const saludoUsuario = document.getElementById("saludoUsuario");

        const profileImage = document.getElementById("profileImage");
        const profileInitial = document.getElementById("profileInitial");

        const publishImage = document.getElementById("publishImage");
        const publishInitial = document.getElementById("publishInitial");

        const idiomaGuardado = localStorage.getItem("lang") || "es";
        aplicarIdioma(idiomaGuardado);

        fetch("obtener_sesion.php")
            .then(res => res.json())
            .then(data => {
                const nombre = data.usuario ? data.usuario : "";
                const nombreBase = nombre || (getLang() === "en" ? "Guest" : "Invitado");
                const inicial = nombreBase.trim().charAt(0).toUpperCase();

                saludoUsuario.dataset.nombreActual = nombre;

                if (nombre) {
                    saludoUsuario.textContent = t("saludoUsuario").replace("{nombre}", nombre);
                } else {
                    saludoUsuario.textContent = t("saludoInvitado");
                }

                if (data.foto_perfil && data.foto_perfil.trim() !== "") {
                    profileImage.src = data.foto_perfil;
                    profileImage.style.display = "block";
                    profileInitial.style.display = "none";

                    publishImage.src = data.foto_perfil;
                    publishImage.style.display = "block";
                    publishInitial.style.display = "none";
                } else {
                    profileInitial.textContent = inicial;
                    profileInitial.style.display = "flex";
                    profileImage.style.display = "none";

                    publishInitial.textContent = inicial;
                    publishInitial.style.display = "flex";
                    publishImage.style.display = "none";
                }
            })
            .catch(() => {
                saludoUsuario.dataset.nombreActual = "";
                saludoUsuario.textContent = t("saludoInvitado");

                const inicialInvitado = getLang() === "en" ? "G" : "I";

                profileInitial.textContent = inicialInvitado;
                publishInitial.textContent = inicialInvitado;
            });

        const resultado = document.getElementById("resultado");
        const inputArchivo = document.getElementById("archivoImagen");
        const previewContainer = document.getElementById("previewContainer");

        inputArchivo.addEventListener("change", (e) => {
            previewContainer.innerHTML = "";

            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.createElement("img");
                    img.src = ev.target.result;
                    previewContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });

        function manejarReaccion(btn, tipo) {
            const container = btn.parentElement;
            const likeBtn = container.querySelector(".like-btn");
            const dislikeBtn = container.querySelector(".dislike-btn");

            const updateDisplay = (el, delta) => {
                let span = el.querySelector(".count-number");
                if (!span) {
                    span = document.createElement("span");
                    span.className = "count-number";
                    span.innerText = "0";
                    el.appendChild(span);
                }

                let val = parseInt(span.innerText) + delta;
                span.innerText = val < 0 ? 0 : val;
            };

            if (tipo === "like") {
                if (likeBtn.classList.contains("active")) {
                    updateDisplay(likeBtn, -1);
                    likeBtn.classList.remove("active");
                } else {
                    if (dislikeBtn.classList.contains("active")) {
                        updateDisplay(dislikeBtn, -1);
                        dislikeBtn.classList.remove("active");
                    }
                    updateDisplay(likeBtn, 1);
                    likeBtn.classList.add("active");
                }
            } else {
                if (dislikeBtn.classList.contains("active")) {
                    updateDisplay(dislikeBtn, -1);
                    dislikeBtn.classList.remove("active");
                } else {
                    if (likeBtn.classList.contains("active")) {
                        updateDisplay(likeBtn, -1);
                        likeBtn.classList.remove("active");
                    }
                    updateDisplay(dislikeBtn, 1);
                    dislikeBtn.classList.add("active");
                }
            }
        }

        function agregarComentario(e, input, parentList = null) {
            if (e.key === "Enter" && input.value.trim() !== "") {
                const text = input.value;
                const list = parentList || input.closest(".comments-section").querySelector(".comments-list");

                const item = document.createElement("div");
                item.className = "comment-item";
                item.innerHTML = `
                    <div class="comment-bubble">
                        <strong>${t("anonimo")}</strong>
                        <div>${text}</div>
                    </div>
                    <div class="comment-actions">
                        <span class="like-btn" onclick="manejarReaccion(this, 'like')">${t("meGusta")} <span class="count-number">0</span></span>
                        <span class="dislike-btn" onclick="manejarReaccion(this, 'dislike')">${t("noMeGusta")} <span class="count-number">0</span></span>
                    </div>
                `;
                list.appendChild(item);
                input.value = "";
            }
        }

        function toggleMenu(btn) {
            const menu = btn.nextElementSibling;
            menu.classList.toggle("show");
        }

        function editarPost(btn) {
            const post = btn.closest(".post-card");
            const texto = post.querySelector(".post-text")?.innerText || "";
            const url = post.querySelector(".link-preview-card")?.href || "";

            post.innerHTML = `
                <div class="edit-post-box">
                    <textarea class="edit-text">${texto}</textarea>
                    <input type="url" class="edit-url" value="${url}" placeholder="${t("editarEnlace")}">
                    <input type="file" class="edit-files">
                    <button onclick="finalizarEdicion(this)">${t("guardar")}</button>
                </div>
            `;
        }

        function eliminarPost(btn) {
            const postCard = btn.closest(".post-card");
            const postId = postCard.dataset.id;

            if (!postId) {
                alert(t("errorIdPost"));
                return;
            }

            const confirmar = confirm(t("confirmarEliminar"));
            if (!confirmar) return;

            const datos = new FormData();
            datos.append("post_id", postId);

            fetch("eliminar_post.php", {
                method: "POST",
                body: datos
            })
            .then(res => res.text())
            .then(respuesta => {
                if (respuesta.trim() === "ok") {
                    postCard.remove();
                } else {
                    alert(t("errorEliminar"));
                    console.log(respuesta);
                }
            })
            .catch(err => {
                console.error("Error al eliminar:", err);
                alert(t("errorEliminar"));
            });
        }

        function finalizarEdicion(btn) {
    const post = btn.closest(".post-card");
    const postId = post.dataset.id; // Asegúrate de que tu <div class="post-card"> tenga el data-id="${post.id}"
    
    if (!postId) {
        alert("Error: No se encontró el ID del post.");
        return;
    }

    const texto = post.querySelector(".edit-text").value;
    // const url = post.querySelector(".edit-url").value; // Descomenta si usas URL
    
    const datos = new FormData();
    datos.append("post_id", postId);
    datos.append("texto", texto);
    // datos.append("url", url); // Descomenta si usas URL

    // Le mandamos la info a PHP
    fetch("editar_post.php", {
        method: "POST",
        body: datos
    })
    .then(res => res.text())
    .then(respuesta => {
        if (respuesta.trim() === "ok") {
            // ¡Éxito! Recargamos la página para que se vean los cambios fresquecitos desde la BD
            // (O si tienes una función como cargarPosts(), puedes llamarla en lugar de reload)
            window.location.reload(); 
        } else {
            alert(respuesta); // Muestra el error de PHP (ej. "No tienes permiso")
        }
    })
    .catch(err => {
        console.error("Error al editar:", err);
        alert("Hubo un problema al conectar con el servidor.");
    });
}

        // 👇 Le agregamos los 3 IDs al final de esta línea para saber de quién es el post
function crearPost(texto, imgs, likes = 0, dislikes = 0, todosLosComentarios = [], miReaccion = null, nombreAutor = "Anónimo", autorId = null, miId = null, miRol = null) {
            const post = document.createElement("div");
            post.className = "post-card";

            let mediaHTML = imgs.map(src => `<img src="${src}" class="post-img" style="border-radius:14px; margin-top:10px; width:100%;">`).join('');

            const principales = todosLosComentarios.filter(c => !c.padre_id || c.padre_id == 0);
            const respuestas = todosLosComentarios.filter(c => c.padre_id > 0);

            let comentariosHTML = principales.map(c => {
                const susRespuestas = respuestas.filter(r => r.padre_id == c.id).map(r => `
                    <div class="comment-item reply-item" style="margin-left: 30px; border-left: 2px solid var(--accent-2, #42d79a); padding-left:10px; margin-top:5px;">
                        <div class="comment-text"><strong style="color:var(--accent-2, #42d79a);">${r.nombre_autor || "Usuario"}:</strong> ${r.comentario}</div>
                    </div>
                `).join('');

                return `
                    <div class="comment-item" data-id="${c.id}" style="margin-bottom:10px; padding:12px; background: var(--panel-soft, rgba(255,255,255,0.04)); border-radius:14px;">
                        <div class="comment-text"><strong style="color:var(--accent, #76f3c2);">${c.nombre_autor || "Usuario"}:</strong> ${c.comentario}</div>
                        <div class="comment-actions" style="margin-top:8px;">
                            <span onclick="prepararRespuesta(this)" style="color:var(--muted, #9dc7b8); cursor:pointer; font-size:12px; font-weight:600;">${t("responder")}</span>
                        </div>
                        <div class="reply-input-container"></div>
                        <div class="reply-list">${susRespuestas}</div>
                    </div>
                `;
            }).join('');

           const nombreFinal = nombreAutor ? nombreAutor : "Usuario";

// Sacamos las palabras del nombre completo
const palabras = nombreFinal.trim().split(" ");
// Agarramos la primera letra de la primera palabra
let inicial = palabras[0].charAt(0).toUpperCase();
// Si hay más de una palabra (ej. tiene apellido), agarramos la primera letra de la segunda palabra también
if (palabras.length > 1) {
    inicial += palabras[1].charAt(0).toUpperCase();
}

            // 🔒 AQUÍ ESTÁ LA MAGIA: Guardamos tu menú en una variable
            let opcionesHTML = "";
            
            // Y SOLO lo dibujamos si el post es tuyo o si eres admin
            if (autorId == miId || miRol === 'admin') {
                opcionesHTML = `
                    <div class="post-options-container">
                        <button class="options-btn" onclick="toggleMenu(this)">⋯</button>
                        <div class="options-menu">
                            <button onclick="editarPost(this)">${t("editar")}</button>
                            <button onclick="eliminarPost(this)" style="color:#ff7d92;">${t("eliminar")}</button>
                        </div>
                    </div>
                `;
            }

            post.innerHTML = `
                <div class="post-header">
                    <div class="post-user">
                        <div class="profile-circle small" style="width:40px; height:40px; border-radius:50%; background:var(--accent, #76f3c2); color:#000; display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:18px;">
                            ${inicial}
                        </div>
                        <div>
                            <h4 style="margin:0; color:var(--text, #fff); font-size:15px;">${nombreFinal}</h4>
                            <span style="font-size:12px; color:var(--muted, #9dc7b8);">${t("haceUnMomento")}</span>
                        </div>
                    </div>

                    ${opcionesHTML}

                </div>

                <div class="post-content" style="margin-top:15px;">
                    <p class="post-text">${texto}</p>
                    <div class="post-images-grid">${mediaHTML}</div>
                </div>

                <div class="post-actions" style="margin-top:15px; display:flex; gap:10px;">
                    <button class="action-btn like-btn ${miReaccion === 'like' ? 'active' : ''}" onclick="manejarReaccion(this, 'like')">
                        ${t("meGusta")} <span class="count-number">${likes}</span>
                    </button>
                    <button class="action-btn dislike-btn ${miReaccion === 'dislike' ? 'active' : ''}" onclick="manejarReaccion(this, 'dislike')">
                        ${t("noMeGusta")} <span class="count-number">${dislikes}</span>
                    </button>
                </div>

                <div class="comments-section" style="margin-top:15px;">
                    <div class="comments-list">${comentariosHTML}</div>
                    <div class="comment-input-row" style="margin-top:10px;">
                        <input type="text" placeholder="${t("escribeComentario")}" 
                            onkeypress="if(event.key==='Enter') enviarComentario(this.value, this.closest('.post-card').dataset.id, 0)"
                            style="width: 100%; background: var(--panel-soft, rgba(255,255,255,0.04)); color: var(--text, #ecfff6); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 14px; padding: 12px 14px; outline: none;">
                    </div>
                </div>
            `;
            return post;
        }

        function manejarReaccion(btn, tipo) {
            const postCard = btn.closest('.post-card');
            const postId = postCard.dataset.id;
            const likeBtn = postCard.querySelector('.like-btn');
            const dislikeBtn = postCard.querySelector('.dislike-btn');

            const datos = new FormData();
            datos.append('post_id', postId);
            datos.append('tipo', tipo);

            fetch('reaccionar.php', { method: 'POST', body: datos })
                .then(res => res.text())
                .then(nuevoTotal => {
                    btn.querySelector('.count-number').innerText = nuevoTotal;
                    btn.classList.toggle('active');

                    if (btn.classList.contains("active")) {
                        if (tipo === 'like' && dislikeBtn && dislikeBtn.classList.contains("active")) {
                            dislikeBtn.classList.remove("active");
                            let count = parseInt(dislikeBtn.querySelector(".count-number").innerText);
                            if (count > 0) dislikeBtn.querySelector(".count-number").innerText = count - 1;
                        } else if (tipo === 'dislike' && likeBtn && likeBtn.classList.contains("active")) {
                            likeBtn.classList.remove("active");
                            let count = parseInt(likeBtn.querySelector(".count-number").innerText);
                            if (count > 0) likeBtn.querySelector(".count-number").innerText = count - 1;
                        }
                    }
                })
                .catch(err => console.error("Error al reaccionar:", err));
        }

        function prepararRespuesta(span) {
            const contenedor = span.closest(".comment-item").querySelector(".reply-input-container");
            if (contenedor.innerHTML !== "") return;

            const input = document.createElement("input");
            input.placeholder = t("escribeRespuesta");
            input.style = "width: 90%; margin-left: 30px; margin-top: 10px; padding: 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.06); background: var(--panel-soft, rgba(255,255,255,0.04)); color: var(--text, #ecfff6); outline: none;";

            input.onkeypress = (e) => {
                if (e.key === "Enter") {
                    enviarComentario(input.value, span.closest(".post-card").dataset.id, span.closest(".comment-item").dataset.id);
                }
            };
            contenedor.appendChild(input);
            input.focus();
        }

        function enviarComentario(texto, postId, padreId) {
            if (!texto.trim()) return;
            const fd = new FormData();
            fd.append('post_id', postId);
            fd.append('comentario', texto);
            fd.append('padre_id', padreId || 0);

            fetch('comentar.php', { method: 'POST', body: fd })
                .then(() => location.reload());
        }

        window.onload = async () => {
            let miUsuarioId = null;
            let miRol = null;

            // 1. Cargamos la sesión
            try {
                const peticionSesion = await fetch("obtener_sesion.php");
                const sesion = await peticionSesion.json();
                miUsuarioId = sesion.usuario_id;
                miRol = sesion.rol;

                // 👇 AQUÍ RECIBIMOS EL NOMBRE COMPLETO
                const saludoActual = document.getElementById("saludoUsuario");
                
                if (sesion.nombre_completo) {
                    saludoActual.dataset.nombreActual = sesion.nombre_completo;
                } else if (sesion.usuario) {
                    saludoActual.dataset.nombreActual = sesion.usuario;
                }

                // 👇 APLICAMOS EL SALUDO Y LA MAGIA DE LAS INICIALES
                const nombreActual = saludoActual.dataset.nombreActual || "";
                
                // Asegurarnos de que tenemos el idioma actual (si no, por defecto "es")
                const lang = localStorage.getItem("lang") || "es";

                if (nombreActual) {
                    saludoActual.textContent = translations[lang].saludoUsuario.replace("{nombre}", nombreActual);
                    
                    // Sacamos las dos iniciales
                    const palabras = nombreActual.trim().split(" ");
                    let iniciales = palabras[0].charAt(0).toUpperCase();
                    if (palabras.length > 1) {
                        iniciales += palabras[1].charAt(0).toUpperCase();
                    }
                    
                    // Se las ponemos a los iconos
                    document.getElementById("profileInitial").textContent = iniciales;
                    document.getElementById("publishInitial").textContent = iniciales;
                } else {
                    // Si es invitado
                    saludoActual.textContent = translations[lang].saludoInvitado;
                    const inicialInvitado = lang === "en" ? "G" : "I";
                    document.getElementById("profileInitial").textContent = inicialInvitado;
                    document.getElementById("publishInitial").textContent = inicialInvitado;
                }

            } catch (e) {
                console.error("No se pudo cargar la sesión", e);
            }

            // 2. Ahora sí, traemos los posts (ESTO SE QUEDA IGUAL)
            fetch("obtener_posts.php")
            // ... (aquí sigue el resto de tu código normal) ...
        .then(response => response.json())
        .then(data => {
            let resultado = document.getElementById("resultado");
            if (!resultado) {
                resultado = document.createElement("div");
                resultado.id = "resultado";
                document.querySelector(".main-content").appendChild(resultado);
            }

            resultado.innerHTML = "";
            data.forEach(post => {
                const imgArray = post.imagen ? ["uploads/" + post.imagen] : [];

                // 🚨 LE MANDAMOS 3 DATOS NUEVOS A crearPost al final 🚨
                const nuevoPost = crearPost(
                    post.texto || "",
                    imgArray,
                    post.total_likes || 0,
                    post.total_dislikes || 0,
                    post.comentarios_data || [],
                    post.mi_reaccion || null,
                    post.nombre_autor,
                    post.usuario_id, // El ID del dueño del post
                    miUsuarioId,     // Tu ID
                    miRol            // Tu rol (para saber si eres admin)
                );

                nuevoPost.dataset.id = post.id;
                resultado.appendChild(nuevoPost);
            });
        })
        .catch(err => console.error("Error al cargar posts:", err));
};
    </script>
