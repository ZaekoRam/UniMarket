<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMarket - Inicio</title>
    <link rel="stylesheet" href="style_home.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-mascot">
                <img src="img/UNI_EMOTE.png" alt="UniMarket Mascot">
            </div>
            <div class="sidebar-brand">UniMarket</div>
        </div>

        <nav class="sidebar-menu">
            <a href="#" class="menu-item active">
                <span class="icon">🏠</span>
                <span class="label">Inicio</span>
            </a>

            <a href="#" class="menu-item">
                <span class="icon">👤</span>
                <span class="label">Perfil</span>
            </a>

            <a href="#" class="menu-item">
                <span class="icon">💬</span>
                <span class="label">Mensajes</span>
            </a>

            <a href="#" class="menu-item">
                <span class="icon">🔔</span>
                <span class="label">Notificaciones</span>
            </a>

            <a href="#" class="menu-item">
                <span class="icon">⚙️</span>
                <span class="label">Configuración</span>
            </a>

            <a href="./Login.html" class="menu-item">
                <span class="icon">🚪</span>
                <span class="label">Cerrar sesión</span>
            </a>

            <button id="themeToggle" class="theme-switch" type="button" aria-label="Cambiar tema">
                <span class="theme-thumb" id="themeThumb">🌙</span>
                <span class="theme-text" id="themeText">Dark Mode</span>
            </button>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="welcome-box">
                <div class="profile-circle" id="profileCircle">
                    <img id="profileImage" src="" alt="Foto de perfil" style="display: none;">
                    <span id="profileInitial">U</span>
                </div>

                <div class="welcome-text">
                    <p class="small-text">Todo comienza por un 0</p>
                    <h1 id="saludoUsuario">Hola, Usuario</h1>
                </div>
            </div>

            <div class="topbar-logo">UniMarket</div>
        </header>

        <section class="feed-container">
            <div class="publish-box">
                <div class="publish-header">
                    <div class="profile-circle small" id="publishCircle">
                        <img id="publishImage" src="" alt="Foto de perfil" style="display: none;">
                        <span id="publishInitial">U</span>
                    </div>

                    <div>
                        <h3>Crear publicación</h3>
                        <p>Comparte algo con la comunidad de UniMarket</p>
                    </div>
                </div>

                <form id="contenidoForm" action="menu.php" method="POST" enctype="multipart/form-data">
                    <textarea id="texto" name="texto" placeholder="¿Qué vamos a emprender hoy?" rows="3"></textarea>

                    <div id="previewContainer" class="post-images-grid preview-grid"></div>

                    <label class="custom-file">
                        <input type="file" id="archivoImagen" name="imagen" accept="image/*">
                        <span>📷 Agregar imagen</span>
                    </label>

                    <input type="url" id="urlEnlace" name="link" placeholder="Enlace externo (https://...)">

                    <button type="submit" class="btn-publicar">Publicar</button>
                </form>
            </div>

            <div id="resultado"></div>
        </section>
    </main>

    <script>
        const body = document.body;
        const themeToggle = document.getElementById("themeToggle");
        const themeThumb = document.getElementById("themeThumb");
        const themeText = document.getElementById("themeText");

        function aplicarTema(modo) {
            if (modo === "light") {
                body.classList.add("light-mode");
                themeThumb.textContent = "☀️";
                themeText.textContent = "Light Mode";
            } else {
                body.classList.remove("light-mode");
                themeThumb.textContent = "🌙";
                themeText.textContent = "Dark Mode";
            }
        }

        const temaGuardado = localStorage.getItem("tema") || "dark";
        aplicarTema(temaGuardado);

        themeToggle.addEventListener("click", () => {
            const esLight = body.classList.contains("light-mode");
            const nuevoTema = esLight ? "dark" : "light";
            localStorage.setItem("tema", nuevoTema);
            aplicarTema(nuevoTema);
        });

        const saludoUsuario = document.getElementById("saludoUsuario");

        const profileImage = document.getElementById("profileImage");
        const profileInitial = document.getElementById("profileInitial");

        const publishImage = document.getElementById("publishImage");
        const publishInitial = document.getElementById("publishInitial");

        fetch("obtener_sesion.php")
            .then(res => res.json())
            .then(data => {
                const nombre = data.usuario ? data.usuario : "Usuario";
                const inicial = nombre.trim().charAt(0).toUpperCase();

                saludoUsuario.textContent = `Hola, ${nombre}`;

                if (data.foto_perfil && data.foto_perfil.trim() !== "") {
                    profileImage.src = data.foto_perfil;
                    profileImage.style.display = "block";
                    profileInitial.style.display = "none";

                    publishImage.src = data.foto_perfil;
                    publishImage.style.display = "block";
                    publishInitial.style.display = "none";
                } else {
                    profileInitial.textContent = inicial;
                    profileInitial.style.display = "flex";
                    profileImage.style.display = "none";

                    publishInitial.textContent = inicial;
                    publishInitial.style.display = "flex";
                    publishImage.style.display = "none";
                }
            })
            .catch(() => {
                saludoUsuario.textContent = "Hola, Usuario";
                profileInitial.textContent = "U";
                publishInitial.textContent = "U";
            });

        const resultado = document.getElementById("resultado");
        const inputArchivo = document.getElementById("archivoImagen");
        const previewContainer = document.getElementById("previewContainer");

        inputArchivo.addEventListener("change", (e) => {
            previewContainer.innerHTML = "";

            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.createElement("img");
                    img.src = ev.target.result;
                    previewContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });

        function manejarReaccion(btn, tipo) {
            const container = btn.parentElement;
            const likeBtn = container.querySelector(".like-btn");
            const dislikeBtn = container.querySelector(".dislike-btn");

            const updateDisplay = (el, delta) => {
                let span = el.querySelector(".count-number");
                if (!span) {
                    span = document.createElement("span");
                    span.className = "count-number";
                    span.innerText = "0";
                    el.appendChild(span);
                }

                let val = parseInt(span.innerText) + delta;
                span.innerText = val < 0 ? 0 : val;
            };

            if (tipo === "like") {
                if (likeBtn.classList.contains("active")) {
                    updateDisplay(likeBtn, -1);
                    likeBtn.classList.remove("active");
                } else {
                    if (dislikeBtn.classList.contains("active")) {
                        updateDisplay(dislikeBtn, -1);
                        dislikeBtn.classList.remove("active");
                    }
                    updateDisplay(likeBtn, 1);
                    likeBtn.classList.add("active");
                }
            } else {
                if (dislikeBtn.classList.contains("active")) {
                    updateDisplay(dislikeBtn, -1);
                    dislikeBtn.classList.remove("active");
                } else {
                    if (likeBtn.classList.contains("active")) {
                        updateDisplay(likeBtn, -1);
                        likeBtn.classList.remove("active");
                    }
                    updateDisplay(dislikeBtn, 1);
                    dislikeBtn.classList.add("active");
                }
            }
        }

        function agregarComentario(e, input, parentList = null) {
            if (e.key === "Enter" && input.value.trim() !== "") {
                const text = input.value;
                const list = parentList || input.closest(".comments-section").querySelector(".comments-list");

                const item = document.createElement("div");
                item.className = "comment-item";
                item.innerHTML = `
                    <div class="comment-bubble">
                        <strong>Tú</strong>
                        <div>${text}</div>
                    </div>
                    <div class="comment-actions">
                        <span class="like-btn" onclick="manejarReaccion(this, 'like')">👍 <span class="count-number">0</span></span>
                        <span class="dislike-btn" onclick="manejarReaccion(this, 'dislike')">👎 <span class="count-number">0</span></span>
                    </div>
                `;
                list.appendChild(item);
                input.value = "";
            }
        }

        function toggleMenu(btn) {
            btn.nextElementSibling.classList.toggle("show");
        }

        function editarPost(btn) {
            const post = btn.closest(".post-card");
            const texto = post.querySelector(".post-text")?.innerText || "";
            const url = post.querySelector(".link-preview-card")?.href || "";

            post.innerHTML = `
                <div class="edit-post-box">
                    <textarea class="edit-text">${texto}</textarea>
                    <input type="url" class="edit-url" value="${url}" placeholder="Editar enlace">
                    <input type="file" class="edit-files">
                    <button onclick="finalizarEdicion(this)">Guardar</button>
                </div>
            `;
        }

        function finalizarEdicion(btn) {
            const post = btn.closest(".post-card");
            const texto = post.querySelector(".edit-text").value;
            const url = post.querySelector(".edit-url").value;
            const files = post.querySelector(".edit-files").files;

            const guardar = (imgs = []) => {
                const nuevo = crearPost(texto, imgs, url);
                post.replaceWith(nuevo);
            };

            if (files.length > 0) {
                let cargadas = [];
                Array.from(files).forEach(f => {
                    const r = new FileReader();
                    r.onload = (e) => {
                        cargadas.push(e.target.result);
                        if (cargadas.length === files.length) guardar(cargadas);
                    };
                    r.readAsDataURL(f);
                });
            } else {
                guardar();
            }
        }

   // 1. DIBUJAR EL POST (CON DISEÑO, NOMBRE Y FOTO DE PERFIL)
function crearPost(texto, imgs, likes = 0, dislikes = 0, todosLosComentarios = [], miReaccion = null, nombreAutor = "Anónimo") {
    const post = document.createElement("div");
    post.className = "post-card";

    let mediaHTML = imgs.map(src => `<img src="${src}" class="post-img" style="border-radius:14px; margin-top:10px; width:100%;">`).join('');

    // --- LÓGICA DE COMENTARIOS ANIDADOS ---
    const principales = todosLosComentarios.filter(c => !c.padre_id || c.padre_id == 0);
    const respuestas = todosLosComentarios.filter(c => c.padre_id > 0);

    let comentariosHTML = principales.map(c => {
        const susRespuestas = respuestas.filter(r => r.padre_id == c.id).map(r => `
            <div class="comment-item reply-item" style="margin-left: 30px; border-left: 2px solid var(--accent-2, #42d79a); padding-left:10px; margin-top:5px;">
                <div class="comment-text"><strong style="color:var(--accent-2, #42d79a);">Anon:</strong> ${r.comentario}</div>
            </div>
        `).join('');

        return `
            <div class="comment-item" data-id="${c.id}" style="margin-bottom:10px; padding:12px; background: var(--panel-soft, rgba(255,255,255,0.04)); border-radius:14px;">
                <div class="comment-text"><strong style="color:var(--accent, #76f3c2);">Anon:</strong> ${c.comentario}</div>
                <div class="comment-actions" style="margin-top:8px;">
                    <span onclick="prepararRespuesta(this)" style="color:var(--muted, #9dc7b8); cursor:pointer; font-size:12px; font-weight:600;">↳ Responder</span>
                </div>
                <div class="reply-input-container"></div>
                <div class="reply-list">${susRespuestas}</div>
            </div>
        `;
    }).join('');

    // --- LA MAGIA DEL NOMBRE Y EL CÍRCULO ---
    const nombreFinal = nombreAutor ? nombreAutor : "Usuario";
    const inicial = nombreFinal.trim().charAt(0).toUpperCase();

    post.innerHTML = `
        <div class="post-header" style="display:flex; justify-content:space-between; align-items:center;">
            <div class="post-user" style="display:flex; align-items:center; gap:10px;">
                <div class="profile-circle small" style="width:40px; height:40px; border-radius:50%; background:var(--accent, #76f3c2); color:#000; display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:18px;">
                    ${inicial}
                </div>
                <div>
                    <h4 style="margin:0; color:var(--text, #fff); font-size:15px;">${nombreFinal}</h4>
                    <span style="font-size:12px; color:var(--muted, #9dc7b8);">Hace un momento</span>
                </div>
            </div>

            <div class="post-options-container" style="position:relative;">
                <button class="options-btn" onclick="toggleMenu(this)" style="background:none; border:none; color:var(--text, #fff); font-size:20px; cursor:pointer;">⋯</button>
                <div class="options-menu" style="display:none; position:absolute; right:0; background:var(--panel-strong, #111); border:1px solid rgba(255,255,255,0.1); border-radius:8px; overflow:hidden;">
                    <button onclick="editarPost(this)" style="width:100%; padding:10px; background:none; border:none; color:#fff; cursor:pointer;">Editar</button>
                    <button class="delete-btn" onclick="this.closest('.post-card').remove();" style="width:100%; padding:10px; background:none; border:none; color:#ff7d92; cursor:pointer;">Eliminar</button>
                </div>
            </div>
        </div>

        <div class="post-content" style="margin-top:15px;">
            <p class="post-text">${texto}</p>
            <div class="post-images-grid">${mediaHTML}</div>
        </div>

        <div class="post-actions" style="margin-top:15px; display:flex; gap:10px;">
            <button class="action-btn like-btn ${miReaccion === 'like' ? 'active' : ''}" onclick="manejarReaccion(this, 'like')">
                👍 Me gusta <span class="count-number">${likes}</span>
            </button>
            <button class="action-btn dislike-btn ${miReaccion === 'dislike' ? 'active' : ''}" onclick="manejarReaccion(this, 'dislike')">
                👎 No me gusta <span class="count-number">${dislikes}</span>
            </button>
        </div>

        <div class="comments-section" style="margin-top:15px;">
            <div class="comments-list">${comentariosHTML}</div>
            <div class="comment-input-row" style="margin-top:10px;">
                <input type="text" placeholder="Escribe un comentario..." 
                    onkeypress="if(event.key==='Enter') enviarComentario(this.value, this.closest('.post-card').dataset.id, 0)"
                    style="width: 100%; background: var(--panel-soft, rgba(255,255,255,0.04)); color: var(--text, #ecfff6); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 14px; padding: 12px 14px; outline: none;">
            </div>
        </div>
    `;
    return post;
}

// 2. FUNCIÓN PARA LIKES EXCLUSIVOS (La que se te había borrado)
function manejarReaccion(btn, tipo) {
    const postCard = btn.closest('.post-card');
    const postId = postCard.dataset.id;
    const likeBtn = postCard.querySelector('.like-btn');
    const dislikeBtn = postCard.querySelector('.dislike-btn');

    const datos = new FormData();
    datos.append('post_id', postId);
    datos.append('tipo', tipo);

    fetch('reaccionar.php', { method: 'POST', body: datos })
    .then(res => res.text())
    .then(nuevoTotal => {
        btn.querySelector('.count-number').innerText = nuevoTotal;
        btn.classList.toggle('active');

        if (btn.classList.contains("active")) {
            if (tipo === 'like' && dislikeBtn && dislikeBtn.classList.contains("active")) {
                dislikeBtn.classList.remove("active");
                let count = parseInt(dislikeBtn.querySelector(".count-number").innerText);
                if (count > 0) dislikeBtn.querySelector(".count-number").innerText = count - 1;
            } else if (tipo === 'dislike' && likeBtn && likeBtn.classList.contains("active")) {
                likeBtn.classList.remove("active");
                let count = parseInt(likeBtn.querySelector(".count-number").innerText);
                if (count > 0) likeBtn.querySelector(".count-number").innerText = count - 1;
            }
        }
    })
    .catch(err => console.error("Error al reaccionar:", err));
}

// 3. FUNCIÓN PARA PREPARAR RESPUESTA ANIDADA (También se borró)
function prepararRespuesta(span) {
    const contenedor = span.closest(".comment-item").querySelector(".reply-input-container");
    if (contenedor.innerHTML !== "") return; 

    const input = document.createElement("input");
    input.placeholder = "Escribe tu respuesta...";
    input.style = "width: 90%; margin-left: 30px; margin-top: 10px; padding: 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.06); background: var(--panel-soft, rgba(255,255,255,0.04)); color: var(--text, #ecfff6); outline: none;";
    
    input.onkeypress = (e) => {
        if(e.key === "Enter") {
            enviarComentario(input.value, span.closest(".post-card").dataset.id, span.closest(".comment-item").dataset.id);
        }
    };
    contenedor.appendChild(input);
    input.focus();
}

// 4. FUNCIÓN PARA ENVIAR EL COMENTARIO A PHP (Esta igual faltaba)
function enviarComentario(texto, postId, padreId) {
    if (!texto.trim()) return;
    const fd = new FormData();
    fd.append('post_id', postId);
    fd.append('comentario', texto);
    fd.append('padre_id', padreId || 0);

    fetch('comentar.php', { method: 'POST', body: fd })
    .then(() => location.reload());
}

// 5. CARGAR PUBLICACIONES AL INICIAR
window.onload = () => {
    fetch("obtener_posts.php")
        .then(response => response.json())
        .then(data => {
            let resultado = document.getElementById("resultado");
            if (!resultado) {
                resultado = document.createElement("div");
                resultado.id = "resultado";
                document.querySelector(".main-content").appendChild(resultado);
            }
            
            resultado.innerHTML = "";
            data.forEach(post => {
                const imgArray = post.imagen ? ["uploads/" + post.imagen] : [];
                
                const nuevoPost = crearPost(
                    post.texto || "", 
                    imgArray, 
                    post.total_likes || 0, 
                    post.total_dislikes || 0, 
                    post.comentarios_data || [],
                    post.mi_reaccion || null,
                    post.nombre_autor 
                );
                
                nuevoPost.dataset.id = post.id;
                resultado.appendChild(nuevoPost);
            });
        })
        .catch(err => console.error("Error:", err));
};

// 6. FUNCIÓN DEL MENÚ DE PUNTITOS
function toggleMenu(btn) {
    const menu = btn.nextElementSibling;
    if(menu.style.display === "none" || menu.style.display === "") {
        menu.style.display = "block";
    } else {
        menu.style.display = "none";
    }
}
    </script>
</body>
</html>
