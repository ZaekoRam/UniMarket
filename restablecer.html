<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña · UniMarket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-main: linear-gradient(135deg, #051312, #081f1d, #03100f);
            --accent: #39c5bb;
            --accent-2: #66fff0;
            --accent-gradient: linear-gradient(135deg, #66fff0, #39c5bb);
            --text: #eafffb;
            --muted: #9bded7;
            --panel: rgba(10, 24, 23, 0.88);
            --panel-soft: rgba(255, 255, 255, 0.04);
            --shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
            --radius: 28px;
            --border-glow: rgba(102, 255, 240, 0.25);
            --error-red: #ff3366;
            --error-red-glow: rgba(255, 51, 102, 0.4);
            --success-green: #39c5bb;
            --success-green-glow: rgba(57, 197, 187, 0.4);
        }

        body.light-mode {
            --bg-main: linear-gradient(135deg, #dffcf9, #c9f6f0, #eefefd);
            --accent: #39c5bb;
            --accent-2: #0f8f87;
            --text: #10211c;
            --muted: #4f7c76;
            --panel: rgba(236, 250, 248, 0.88);
            --panel-soft: rgba(6, 27, 26, 0.05);
            --shadow: 0 18px 45px rgba(20, 70, 50, 0.12);
            --border-glow: rgba(15, 143, 135, 0.25);
            --error-red: #e63950;
            --error-red-glow: rgba(230, 57, 80, 0.3);
        }

        body {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            background: var(--bg-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* Efecto CRT scanlines */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.08) 0px, rgba(0, 0, 0, 0.08) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 997;
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines {
            from { background-position: 0 0; }
            to { background-position: 0 20px; }
        }

        /* Fondo animado */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(57, 197, 187, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 996;
            animation: bgPulse 4s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Partículas flotantes */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 995;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.4;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            to { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* Tarjeta principal */
        .reset-card {
            position: relative;
            z-index: 10;
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius);
            padding: 48px 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardReveal 0.6s ease;
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .reset-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow), 0 0 40px rgba(57, 197, 187, 0.2);
            transform: translateY(-5px);
        }

        /* Icono */
        .key-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, rgba(57, 197, 187, 0.15), rgba(102, 255, 240, 0.05));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--accent);
            border: 2px solid rgba(57, 197, 187, 0.3);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(57, 197, 187, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(57, 197, 187, 0); }
        }

        /* Título */
        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Campos de input */
        .input-group {
            position: relative;
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--accent-2);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: monospace;
        }

        /* Contenedor del input con iconos */
        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 16px;
            z-index: 2;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 50px 16px 45px;
            background: var(--panel-soft);
            border: 2px solid rgba(102, 255, 240, 0.15);
            border-radius: 50px;
            color: var(--text);
            font-size: 16px;
            font-family: monospace;
            transition: all 0.3s;
            outline: none;
        }

        body.light-mode .input-wrapper input {
            border-color: rgba(15, 143, 135, 0.2);
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(57, 197, 187, 0.15);
        }

        .input-wrapper input::placeholder {
            color: var(--muted);
            opacity: 0.5;
            font-family: monospace;
        }

        /* Botón de mostrar/ocultar contraseña */
        .toggle-pass {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--muted);
            font-size: 18px;
            transition: all 0.3s;
            z-index: 2;
            background: transparent;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-pass:hover {
            color: var(--accent);
            transform: translateY(-50%) scale(1.1);
        }

        /* ========== MENSAJES DECORADOS ========== */
        
        /* Mensaje de error - ESTILO CYBERPUNK */
        .error-message {
            background: linear-gradient(135deg, rgba(255, 51, 102, 0.15), rgba(255, 51, 102, 0.05));
            border-left: 4px solid var(--error-red);
            border-right: 1px solid rgba(255, 51, 102, 0.2);
            border-top: 1px solid rgba(255, 51, 102, 0.2);
            border-bottom: 1px solid rgba(255, 51, 102, 0.2);
            color: #ff7d92;
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 13px;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(4px);
            animation: glowPulse 2s ease-in-out infinite, shake 0.4s ease;
        }

        @keyframes glowPulse {
            0%, 100% { 
                box-shadow: 0 0 0 0 var(--error-red-glow); 
                border-left-color: var(--error-red);
            }
            50% { 
                box-shadow: 0 0 15px 2px rgba(255, 51, 102, 0.25); 
                border-left-color: #ff6699;
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .error-message i {
            font-size: 18px;
            animation: iconBounce 0.8s ease infinite;
        }

        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* Mensaje de éxito */
        .success-message {
            background: linear-gradient(135deg, rgba(57, 197, 187, 0.15), rgba(57, 197, 187, 0.05));
            border-left: 4px solid var(--success-green);
            border-right: 1px solid rgba(57, 197, 187, 0.2);
            border-top: 1px solid rgba(57, 197, 187, 0.2);
            border-bottom: 1px solid rgba(57, 197, 187, 0.2);
            color: var(--accent-2);
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 13px;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(4px);
            animation: successGlow 2s ease-in-out infinite;
        }

        @keyframes successGlow {
            0%, 100% { box-shadow: 0 0 0 0 var(--success-green-glow); }
            50% { box-shadow: 0 0 15px 2px rgba(57, 197, 187, 0.2); }
        }

        .success-message i {
            font-size: 18px;
        }

        /* Botón principal */
        .btn-update {
            position: relative;
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 50px;
            color: #082016;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s;
            margin-top: 16px;
        }

        .btn-update::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-update:hover::before {
            left: 100%;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--accent);
        }

        .btn-update:active {
            transform: translateY(0);
        }

        /* Enlace de vuelta */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            margin-top: 24px;
        }

        body.light-mode .back-link {
            background: rgba(0, 0, 0, 0.03);
        }

        .back-link:hover {
            color: var(--accent-2);
            background: rgba(57, 197, 187, 0.1);
            gap: 12px;
        }

        /* Home chip */
        .home-chip {
            position: fixed;
            top: 20px;
            left: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 22px;
            border-radius: 999px;
            background: linear-gradient(180deg, #39c5bb, #0f8f87);
            border: 1px solid rgba(102, 255, 240, 0.25);
            color: #ffffff;
            text-decoration: none;
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .22);
            backdrop-filter: blur(12px);
            transition: all 0.3s;
            z-index: 100;
        }

        .home-chip:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, .28), 0 0 22px rgba(102, 255, 240, 0.30);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            text-align: center;
        }

        .toast {
            padding: 12px 24px;
            background: var(--panel);
            border: 1px solid var(--accent);
            border-radius: 50px;
            color: var(--accent-2);
            font-family: monospace;
            font-size: 14px;
            backdrop-filter: blur(10px);
            animation: toastSlide 0.3s ease;
        }

        @keyframes toastSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Requisitos de contraseña - decorativos */
        .password-requirements {
            margin-top: 8px;
            padding: 10px 12px;
            background: rgba(57, 197, 187, 0.05);
            border-radius: 12px;
            font-size: 11px;
            font-family: monospace;
            color: var(--muted);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .req-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .req-item i {
            font-size: 10px;
        }

        .req-item.valid {
            color: var(--accent-2);
        }

        .req-item.invalid {
            color: var(--error-red);
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 550px) {
            .reset-card { padding: 32px 24px; }
            h1 { font-size: 26px; }
            .key-icon { width: 65px; height: 65px; font-size: 32px; }
            .home-chip { padding: 8px 16px; font-size: 12px; }
            .password-requirements { flex-direction: column; gap: 6px; }
        }
    </style>
</head>
<body>
    <!-- Partículas flotantes -->
    <div class="particles" id="particles"></div>

    <!-- Botón home -->
    <a href="index" class="home-chip">
        <i class="fas fa-arrow-left"></i> Volver al inicio
    </a>

    <div class="reset-card">
        <div class="key-icon">
            <i class="fas fa-key"></i>
        </div>
        <h1>Nueva contraseña</h1>
        <p class="subtitle">Establece una nueva contraseña para tu cuenta.</p>
        
        <!-- Mensaje de error decorado -->
        <div id="errorMessage" class="error-message" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText"></span>
        </div>

        <form id="resetForm" action="actualizar_password.php" method="POST">
            <div class="input-group">
                <label>🔒 NUEVA CONTRASEÑA</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" id="password" placeholder="Mínimo 8 caracteres" required minlength="8">
                    <i class="fas fa-eye-slash toggle-pass" onclick="togglePassword('password', this)"></i>
                </div>
                <!-- Requisitos de contraseña decorativos -->
                <div class="password-requirements" id="passwordReqs">
                    <div class="req-item" id="reqLength"><i class="fas fa-circle"></i> Mínimo 8 caracteres</div>
                    <div class="req-item" id="reqUpper"><i class="fas fa-circle"></i> Mayúscula</div>
                    <div class="req-item" id="reqLower"><i class="fas fa-circle"></i> Minúscula</div>
                    <div class="req-item" id="reqSpecial"><i class="fas fa-circle"></i> Carácter especial</div>
                </div>
            </div>
            <div class="input-group">
                <label>🔁 CONFIRMAR CONTRASEÑA</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="confirm_password" id="confirm" placeholder="Repite tu contraseña" required>
                    <i class="fas fa-eye-slash toggle-pass" onclick="togglePassword('confirm', this)"></i>
                </div>
            </div>
            <button type="submit" class="btn-update">
                <i class="fas fa-save"></i> Actualizar contraseña
            </button>
        </form>

        <a href="index" class="back-link">
            <i class="fas fa-arrow-left"></i> Volver al inicio
        </a>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ========== TEMA (LEE EL TEMA GUARDADO) ==========
        function applySavedTheme() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "light") {
                document.body.classList.add("light-mode");
            } else {
                document.body.classList.remove("light-mode");
            }
        }
        
        applySavedTheme();
        
        window.addEventListener("storage", (e) => {
            if (e.key === "theme") {
                if (e.newValue === "light") {
                    document.body.classList.add("light-mode");
                } else {
                    document.body.classList.remove("light-mode");
                }
            }
        });

        // ========== MOSTRAR/OCULTAR CONTRASEÑA ==========
        function togglePassword(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                iconElement.classList.remove("fa-eye-slash");
                iconElement.classList.add("fa-eye");
            } else {
                input.type = "password";
                iconElement.classList.remove("fa-eye");
                iconElement.classList.add("fa-eye-slash");
            }
            input.focus();
        }

        // ========== VALIDACIÓN EN TIEMPO REAL DE REQUISITOS ==========
        const passwordInput = document.getElementById("password");
        const reqLength = document.getElementById("reqLength");
        const reqUpper = document.getElementById("reqUpper");
        const reqLower = document.getElementById("reqLower");
        const reqSpecial = document.getElementById("reqSpecial");

        function updateRequirements() {
            const password = passwordInput.value;
            
            // Largo
            if (password.length >= 8) {
                reqLength.classList.add("valid");
                reqLength.classList.remove("invalid");
                reqLength.innerHTML = '<i class="fas fa-check-circle"></i> Mínimo 8 caracteres';
            } else {
                reqLength.classList.add("invalid");
                reqLength.classList.remove("valid");
                reqLength.innerHTML = '<i class="fas fa-circle"></i> Mínimo 8 caracteres';
            }
            
            // Mayúscula
            if (/[A-Z]/.test(password)) {
                reqUpper.classList.add("valid");
                reqUpper.classList.remove("invalid");
                reqUpper.innerHTML = '<i class="fas fa-check-circle"></i> Mayúscula';
            } else {
                reqUpper.classList.add("invalid");
                reqUpper.classList.remove("valid");
                reqUpper.innerHTML = '<i class="fas fa-circle"></i> Mayúscula';
            }
            
            // Minúscula
            if (/[a-z]/.test(password)) {
                reqLower.classList.add("valid");
                reqLower.classList.remove("invalid");
                reqLower.innerHTML = '<i class="fas fa-check-circle"></i> Minúscula';
            } else {
                reqLower.classList.add("invalid");
                reqLower.classList.remove("valid");
                reqLower.innerHTML = '<i class="fas fa-circle"></i> Minúscula';
            }
            
            // Carácter especial
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                reqSpecial.classList.add("valid");
                reqSpecial.classList.remove("invalid");
                reqSpecial.innerHTML = '<i class="fas fa-check-circle"></i> Carácter especial';
            } else {
                reqSpecial.classList.add("invalid");
                reqSpecial.classList.remove("valid");
                reqSpecial.innerHTML = '<i class="fas fa-circle"></i> Carácter especial';
            }
        }

        passwordInput.addEventListener("input", updateRequirements);

        // ========== PARTÍCULAS ==========
        function createParticles() {
            const container = document.getElementById("particles");
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement("div");
                particle.className = "particle";
                particle.style.left = Math.random() * 100 + "%";
                particle.style.width = Math.random() * 4 + 2 + "px";
                particle.style.height = particle.style.width;
                particle.style.animationDelay = Math.random() * 15 + "s";
                particle.style.animationDuration = Math.random() * 10 + 10 + "s";
                particle.style.opacity = Math.random() * 0.4 + 0.2;
                container.appendChild(particle);
            }
        }
        createParticles();

        // ========== TOAST ==========
        function showToast(message, type = "error") {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = `<i class="fas ${type === "error" ? "fa-exclamation-triangle" : "fa-check-circle"}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // ========== VALIDACIÓN DEL FORMULARIO ==========
        const form = document.getElementById("resetForm");
        const errorDiv = document.getElementById("errorMessage");
        const errorText = document.getElementById("errorText");

        form.addEventListener("submit", (e) => {
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirm").value;
            
            errorDiv.style.display = "none";
            
            if (password !== confirm) {
                e.preventDefault();
                errorText.textContent = "❌ Las contraseñas no coinciden";
                errorDiv.style.display = "flex";
                showToast("Las contraseñas no coinciden", "error");
                return;
            }
            
            if (password.length < 8) {
                e.preventDefault();
                errorText.textContent = "❌ La contraseña debe tener al menos 8 caracteres";
                errorDiv.style.display = "flex";
                showToast("La contraseña debe tener al menos 8 caracteres", "error");
                return;
            }
            
            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);
            
            if (!hasUpper || !hasLower || !hasSpecial) {
                e.preventDefault();
                errorText.textContent = "⚠️ La contraseña debe tener: mayúscula, minúscula y carácter especial";
                errorDiv.style.display = "flex";
                showToast("La contraseña debe tener mayúscula, minúscula y carácter especial", "error");
                return;
            }
        });

        // ========== PROCESAR MENSAJE DE URL ==========
        function processUrlMessage() {
            const urlParams = new URLSearchParams(window.location.search);
            const msg = urlParams.get('msg');
            const type = urlParams.get('type');
            if (msg) {
                showToast(decodeURIComponent(msg), type || "error");
                const newUrl = window.location.pathname + window.location.hash;
                window.history.replaceState({}, document.title, newUrl);
            }
        }
        
        processUrlMessage();
    </script>
</body>
</html>
