<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema</title>
    <link rel="stylesheet" href="style_login.css">
</head>
<body>
    <a href="./menu.html" class="back-link">Página Principal</a>

    <div class="container" id="container">
        
        <div class="form-container sign-up-container">
            <form action="validar.php" method="post">
                <h1>Registro</h1>
                <div class="username">
                    <input type="text" name="usuario" required> 
                    <label>Nombre completo</label>
                </div>
                <div class="username">
                    <input type="text" name="num" required> 
                    <label>Número de cuenta</label>
                </div>
                <div class="username">
                    <input type="email" name="cuenta" required> 
                    <label>Correo institucional</label>
                </div>
                <div class="username">
                    <input type="password" name="password" required> 
                    <label>Contraseña</label>
                </div>
                <button type="submit">Registrarse</button>
            </form>
        </div>

        <div class="form-container sign-in-container">
            <form action="validar.php" method="post">
                <h1>Inicio de sesión</h1>
                <div class="username">
                    <input type="text" name="usuario" required> 
                    <label>Nombre de usuario</label>
                </div>
                <div class="username">
                    <input type="password" name="password" required> 
                    <label>Contraseña</label>
                </div>
                <div class="recordar">¿Olvido su contraseña?</div>
                <button type="submit">Iniciar</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>¡Bienvenido!</h1>
                    <p>Si ya tienes una cuenta, vuelve a entrar aquí</p>
                    <button class="ghost" id="signIn">Inicia Sesión</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>¡Hola de nuevo!</h1>
                    <p>¿Aún no tienes cuenta? Regístrate para comenzar</p>
                    <button class="ghost" id="signUp">Quiero el Registro</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');

        signUpButton.addEventListener('click', () => {
            container.classList.add("right-panel-active");
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove("right-panel-active");
        });
    </script>
</body>
</html>
