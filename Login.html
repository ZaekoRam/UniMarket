<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso al Sistema</title>
  <link rel="stylesheet" href="style_login.css">
</head>

<body>
  <a href="./menu.html" class="back-link">Página Principal</a>

  <div class="container login-active" id="container">

    <!-- ================= LADO IZQUIERDO ================= -->
    <div class="brand">
      <h1 class="logo">UniMarket</h1>
      <div class="logo-line"></div>
      <div class="logo-line thin"></div>

      <!-- MENÚ RADIAL -->
      <div class="semi-menu" id="semiMenu">
        <button class="semi-toggle" id="semiToggle" type="button" aria-label="Abrir menú">
          <span class="hamburger">≡</span>
        </button>

        <a class="semi-item i1" href="https://www.ucol.mx/" target="_blank" rel="noopener">
          <img src="img/udc.png" alt="UDC">
        </a>

        <a class="semi-item i2" href="https://www.facebook.com/UdeC.oficial?locale=es_LA" target="_blank" rel="noopener">
          <img src="img/facebook.png" alt="Facebook">
        </a>

        <a class="semi-item i3" href="https://github.com/ZaekoRam/UniMarket" target="_blank" rel="noopener">
          <img src="img/github.png" alt="GitHub">
        </a>
      </div>
    </div>

    <!-- ================= LADO DERECHO ================= -->
    <div class="panel">

      <!-- LOGIN CARD -->
      <div class="form-container sign-in-container">

        <!-- LOGIN COMPLETO -->
        <form class="full-login" action="validar.php" method="post">
          <h1>Inicio de sesión</h1>
          <p>Entra con tus datos</p>

          <div class="username">
            <input type="text" name="usuario" required placeholder="Nombre de usuario">
          </div>

          <div class="username">
            <input type="password" name="password" required placeholder="Contraseña">
          </div>

          <div class="recordar">¿Olvidó su contraseña?</div>

          <button type="submit">Iniciar</button>
        </form>

        <!-- LOGIN MINI (solo cuando estás en REGISTRO) -->
        <div class="mini-login">
          <h1>Inicio de sesión</h1>
          <button type="button" class="ghost" id="signInMini">Inicia sesión</button>
        </div>

      </div>

      <!-- REGISTRO CARD -->
      <div class="form-container sign-up-container">

        <!-- REGISTRO MINI (solo cuando estás en LOGIN) -->
        <div class="mini-register">
          <h1>Registro</h1>
          <button type="button" class="ghost" id="signUpMini">Quiero registrarme</button>
        </div>

        <!-- REGISTRO COMPLETO -->
        <form class="full-register" action="validar.php" method="post">
          <h1>Registro</h1>
          <p>Crea tu cuenta</p>

          <div class="username">
            <input type="text" name="usuario" required placeholder="Nombre completo">
          </div>

          <div class="username">
            <input type="text" name="num" required placeholder="Número de cuenta">
          </div>

          <div class="username">
            <input type="email" name="cuenta" required placeholder="Correo institucional">
          </div>

          <div class="username">
            <input type="password" name="password" required placeholder="Contraseña">
          </div>

          <button type="submit">Registrarse</button>
        </form>

      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
