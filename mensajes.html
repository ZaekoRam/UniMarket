<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mensajes - UniMarket</title>
<link rel="stylesheet" href="mensajes.css">
</head>

<body>

<div class="layout">

<!-- SIDEBAR (IGUAL QUE PERFIL) -->
<aside class="sidebar">

<div class="logo">U</div>

<nav>
<a href="menu.html">🏠</a>
<a href="perfil.html">👤</a>
<a class="active">💬</a>
<a href="#">🔔</a>
<a href="#">⚙️</a>
</nav>

</aside>


<!-- CONTENIDO -->
<main class="mensajes">

    <!-- LISTA -->
    <div class="chats">

        <h3>Mensajes</h3>

        <div class="chat activo">
            <img src="https://i.pravatar.cc/40">
            <div>
                <b>Maria</b>
                <p>Hola, me interesa tu producto</p>
            </div>
        </div>

        <div class="chat">
            <img src="https://i.pravatar.cc/41">
            <div>
                <b>Carlos</b>
                <p>¿Sigue disponible?</p>
            </div>
        </div>

    </div>


    <!-- CONVERSACIÓN -->
    <div class="chat-box">

        <div class="header-chat">
            <b>Maria</b>
        </div>

        <div class="mensajes-box">

            <div class="msg recibido">Hola 👋</div>
            <div class="msg enviado">Hola! ¿En qué te ayudo?</div>
            <div class="msg recibido">¿Cuánto cuesta?</div>

        </div>

        <div class="input-chat">
            <input type="text" placeholder="Escribe un mensaje...">
            <button>Enviar</button>
        </div>

    </div>

</main>

</div>

</body>
</html>
