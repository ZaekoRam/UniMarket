<style>
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(6, 27, 26, 0.85); /* Fondo oscuro transparente */
      display: flex; justify-content: center; align-items: center;
      z-index: 9999; backdrop-filter: blur(6px);
    }
    .modal-content {
      background: #081f1d; border: 2px solid #39c5bb;
      border-radius: 20px; padding: 30px; width: 90%; max-width: 400px;
      text-align: center; box-shadow: 0 0 40px rgba(57, 197, 187, 0.3);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .code-input {
      background: rgba(255, 255, 255, 0.05); border: 2px solid #39c5bb;
      border-radius: 12px; padding: 15px; font-size: 28px;
      color: #39c5bb; text-align: center; letter-spacing: 12px;
      width: 100%; margin: 20px 0; outline: none; font-weight: bold;
    }
    .code-input:focus { border-color: #66fff0; background: rgba(255,255,255,0.1); }
    .btn-verificar {
      background: linear-gradient(90deg, #39c5bb, #66fff0); border: none; 
      padding: 14px 30px; border-radius: 20px; color: #061b1a; 
      font-weight: 800; cursor: pointer; width: 100%; font-size: 16px; 
      margin-bottom: 15px; transition: transform 0.2s;
    }
    .btn-verificar:hover { transform: translateY(-2px); }
    .close-modal {
      background: transparent; border: none; color: #9bded7;
      text-decoration: underline; cursor: pointer; font-size: 14px;
    }
  </style>
